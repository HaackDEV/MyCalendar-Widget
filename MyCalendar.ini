[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Variables]
background_color=18,18,20,120
text_color=245,245,245,255
main_color=200,200,200,255
font_size=11

@IncludeTheme="#CURRENTPATH#Theme.inc"
@IncludeToday="#CURRENTPATH#today/today.inc"
@IncludeWeek="#CURRENTPATH#week/week.inc"

Margin=20
ColumnGap=260
CardW=240
CardH=160

[StyleText]
FontFace=Segoe UI
FontSize=#font_size#
FontColor=#text_color#
AntiAlias=1
ClipString=1

[StyleTitle]
FontFace=Segoe UI
FontSize=9
FontWeight=700
FontColor=#main_color#
AntiAlias=1

[TodayBackground]
Meter=Shape
Shape=Rectangle 0,0,#CardW#,#CardH#,12 | Fill Color #background_color# | StrokeColor 0,0,0,0

[UpcomingBackground]
Meter=Shape
X=#ColumnGap#
Shape=Rectangle 0,0,#CardW#,#CardH#,12 | Fill Color #background_color# | StrokeColor 0,0,0,0

[TodayDateNumber]
Meter=String
MeterStyle=StyleText
X=20
Y=40
FontSize=48
FontWeight=300
Text=11

[TodayDayName]
Meter=String
MeterStyle=StyleText
X=20
Y=25
FontSize=10
Text=MON

[TodayDivider]
Meter=Shape
Shape=Line 80,30,80,130 | Stroke Color #text_color#,50

[TodayHeader]
Meter=String
MeterStyle=StyleTitle
X=95
Y=30
Text=FOCUS OF TODAY

[TodayEvent1]
Meter=String
MeterStyle=StyleText
X=95
Y=55
W=130
Text="- #event1#"
DynamicVariables=1

[TodayEvent2]
Meter=String
MeterStyle=StyleText
X=95
Y=80
W=130
Text="- #event2#"
FontSize=(#font_size#-1)
FontColor=#text_color#,180
DynamicVariables=1

[UpcomingHeader]
Meter=String
MeterStyle=StyleTitle
X=(#ColumnGap# + 20)
Y=20
Text=UPCOMING TASKS

[UpcomingEvent1]
Meter=String
MeterStyle=StyleText
X=(#ColumnGap# + 20)
Y=45
W=200
Text="| #event1#"
DynamicVariables=1

[UpcomingEvent2]
Meter=String
MeterStyle=StyleText
X=(#ColumnGap# + 20)
Y=70
W=200
Text="| #event2#"
DynamicVariables=1

[UpcomingEvent3]
Meter=String
MeterStyle=StyleText
X=(#ColumnGap# + 20)
Y=95
W=200
Text="| #event3#"
DynamicVariables=1

[UpcomingEvent4]
Meter=String
MeterStyle=StyleText
X=(#ColumnGap# + 20)
Y=120
W=200
Text="| #event4#"
DynamicVariables=1