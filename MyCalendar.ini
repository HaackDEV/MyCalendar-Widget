[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Variables]
background_color=18,18,20,120
text_color=245,245,245,255
main_color=200,200,200,255
font_size=11

@IncludeTheme="#CURRENTPATH#Theme.inc"
@IncludeToday="#CURRENTPATH#today/today.inc"
@IncludeWeek="#CURRENTPATH#week/week.inc"

Margin=20
ColumnGap=300
CardW=280
CardH=195

[StyleText]
FontFace=Segoe UI
FontSize=#font_size#
FontColor=#text_color#
AntiAlias=1
ClipString=1

[StyleTitle]
FontFace=Segoe UI
FontSize=9
FontWeight=700
FontColor=#main_color#
AntiAlias=1

[TodayBackground]
Meter=Shape
Shape=Rectangle 0,0,#CardW#,#CardH#,12 | Fill Color #background_color# | StrokeColor 0,0,0,0

[UpcomingBackground]
Meter=Shape
X=#ColumnGap#
Shape=Rectangle 0,0,#CardW#,#CardH#,12 | Fill Color #background_color# | StrokeColor 0,0,0,0

[TodayDateNumber]
Meter=String
MeterStyle=StyleText
X=20
Y=40
FontSize=48
FontWeight=300
Text=11

[TodayDayName]
Meter=String
MeterStyle=StyleText
X=20
Y=25
FontSize=10
Text=MON

[TodayDivider]
Meter=Shape
Shape=Line 80,30,80,175 | Stroke Color #text_color#,50

[TodayHeader]
Meter=String
MeterStyle=StyleTitle
X=95
Y=30
Text=FOCUS OF TODAY

[TodayEvent1]
Meter=String
MeterStyle=StyleText
X=95
Y=55
W=170
Text="#TodayEvent1#"
DynamicVariables=1

[TodayEvent2]
Meter=String
MeterStyle=StyleText
X=95
Y=80
W=170
Text="#TodayEvent2#"
DynamicVariables=1

[TodayEvent3]
Meter=String
MeterStyle=StyleText
X=95
Y=105
W=170
Text="#TodayEvent3#"
DynamicVariables=1

[TodayEvent4]
Meter=String
MeterStyle=StyleText
X=95
Y=130
W=170
Text="#TodayEvent4#"
DynamicVariables=1

[TodayEvent5]
Meter=String
MeterStyle=StyleText
X=95
Y=155
W=170
Text="#TodayEvent5#"
DynamicVariables=1

[UpcomingHeader]
Meter=String
MeterStyle=StyleTitle
X=(#ColumnGap# + 20)
Y=20
Text=UPCOMING TASKS

[UpcomingEvent1]
Meter=String
MeterStyle=StyleText
X=(#ColumnGap# + 20)
Y=45
W=240
Text="#WeekEvent1#"
DynamicVariables=1

[UpcomingEvent2]
Meter=String
MeterStyle=StyleText
X=(#ColumnGap# + 20)
Y=70
W=240
Text="#WeekEvent2#"
DynamicVariables=1

[UpcomingEvent3]
Meter=String
MeterStyle=StyleText
X=(#ColumnGap# + 20)
Y=95
W=240
Text="#WeekEvent3#"
DynamicVariables=1

[UpcomingEvent4]
Meter=String
MeterStyle=StyleText
X=(#ColumnGap# + 20)
Y=120
W=240
Text="#WeekEvent4#"
DynamicVariables=1

[UpcomingEvent5]
Meter=String
MeterStyle=StyleText
X=(#ColumnGap# + 20)
Y=145
W=240
Text="#WeekEvent5#"
DynamicVariables=1