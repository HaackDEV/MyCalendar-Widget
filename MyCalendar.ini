[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Variables]
background_color=18,18,20,120
text_color=245,245,245,255
main_color=200,200,200,255
font_size=11

@IncludeTheme="#CURRENTPATH#Theme.inc"
@IncludeToday="#CURRENTPATH#today/today.inc"
@IncludeWeek="#CURRENTPATH#week/week.inc"

Margin=(20 * #scale#)
ColumnGap=(300 * #scale#)
CardW=(280 * #scale#)
CardH=(195 * #scale#)
WeekCardH=(245 * #scale#)

[StyleText]
FontFace=Segoe UI
FontSize=(#font_size# * #scale#)
FontColor=#text_color#
AntiAlias=1
ClipString=1

[StyleTitle]
FontFace=Segoe UI
FontSize=(9 * #scale#)
FontWeight=700
FontColor=#main_color#
AntiAlias=1

[MeasureRunNode]
Measure=Plugin
Plugin=RunCommand
Parameter=""#CURRENTPATH#MyWidgetCalendar.exe""
State=Hide
FinishAction=[!Refresh]

[MeasureLoop]
Measure=Calc
Formula=(MeasureLoop + 1)
IfCondition=MeasureLoop = 600
IfTrueAction=[!CommandMeasure MeasureRunNode "Run"]

[TodayBackground]
Meter=Shape
Y=(25 * #scale#)
Shape=Rectangle 0,0,#CardW#,#CardH#,(12 * #scale#) | Fill Color #background_color# | StrokeColor 0,0,0,0

[UpcomingBackground]
Meter=Shape
X=#ColumnGap#
Shape=Rectangle 0,0,#CardW#,#WeekCardH#,(12 * #scale#) | Fill Color #background_color# | StrokeColor 0,0,0,0

[TodayDateNumber]
Meter=String
MeterStyle=StyleText
X=(20 * #scale#)
Y=(65 * #scale#)
FontSize=(48 * #scale#)
FontWeight=300
Text=11

[TodayDayName]
Meter=String
MeterStyle=StyleText
X=(20 * #scale#)
Y=(50 * #scale#)
FontSize=(10 * #scale#)
Text=MON

[TodayDivider]
Meter=Shape
Shape=Line (80 * #scale#),(55 * #scale#),(80 * #scale#),(200 * #scale#) | Stroke Color #text_color#,50

[TodayHeader]
Meter=String
MeterStyle=StyleTitle
X=(95 * #scale#)
Y=(55 * #scale#)
Text=FOCUS OF TODAY

[TodayEvent1]
Meter=String
MeterStyle=StyleText
X=(95 * #scale#)
Y=(80 * #scale#)
W=(170 * #scale#)
Text="#TodayEvent1#"
DynamicVariables=1

[TodayEvent2]
